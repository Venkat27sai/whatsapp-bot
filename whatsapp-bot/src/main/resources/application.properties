# ============================================================
#  WhatsApp Bot Simulation — Application Configuration
# ============================================================

# Server
server.port=8080

# Application Info
spring.application.name=whatsapp-bot

# Logging — show full request/response payloads in console
logging.level.com.whatsapp.bot=DEBUG
logging.level.org.springframework.web=INFO

# Pretty-print JSON responses
spring.jackson.serialization.indent-output=true

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# App info
info.app.name=WhatsApp Bot Simulation
info.app.version=1.0.0
info.app.description=A Spring Boot REST API simulating a WhatsApp chatbot webhook
